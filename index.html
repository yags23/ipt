<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8f7f4;color:#1a1a1a;padding:1rem}
h1{font-size:1.4rem;font-weight:500;margin-bottom:0.75rem;color:#333}
#controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem;align-items:center}
#controls span{font-size:13px;color:#666}
.filter-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555;transition:all 0.15s}
.filter-btn:hover,.filter-btn.active{background:#333;color:#fff;border-color:#333}
#table-area{overflow-x:auto;padding-bottom:0.5rem}
#pt-grid{display:grid;grid-template-columns:repeat(18,minmax(34px,1fr));gap:2px;min-width:640px}
.cell{width:100%;aspect-ratio:1;border-radius:4px;border:1px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.1s,box-shadow 0.1s;position:relative}
.cell:hover{transform:scale(1.18);z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.cell .num{font-size:8px;opacity:0.7;line-height:1}
.cell .sym{font-size:13px;font-weight:600;line-height:1.1}
.cell.dim{opacity:0.12}
.cell.empty{cursor:default;background:transparent!important}
.lbl{font-size:9px;color:#888;display:flex;align-items:center;justify-content:flex-end;padding-right:3px}
#legend{display:flex;flex-wrap:wrap;gap:6px;margin:0.75rem 0}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.leg-dot{width:10px;height:10px;border-radius:3px}
#panel{margin-top:1rem;border:1px solid #ddd;border-radius:12px;padding:1.25rem;display:none;background:#fff}
#panel.show{display:block}
#panel-top{display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
#panel-num{font-size:40px;font-weight:300;color:#999;min-width:44px;line-height:1}
#panel-sym{font-size:52px;font-weight:600;line-height:1}
#panel-info{flex:1;min-width:140px}
#panel-name{font-size:20px;font-weight:500}
#panel-cat{font-size:12px;color:#888;margin-top:2px}
#panel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem}
@media(max-width:480px){#panel-grid{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:#f5f4f1;border-radius:8px;padding:0.6rem 0.75rem}
.p-stat-label{font-size:11px;color:#888}
.p-stat-val{font-size:14px;font-weight:500;margin-top:2px;word-break:break-all}
.close-btn{font-size:22px;cursor:pointer;color:#999;background:none;border:none;padding:0;line-height:1;margin-left:auto}
.close-btn:hover{color:#333}
</style>
</head>
<body>
<h1>Periodic Table of Elements</h1>
<div id="controls">
  <span>Filter by category:</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="alkali-metal">Alkali metals</button>
  <button class="filter-btn" data-cat="alkaline-earth">Alkaline earths</button>
  <button class="filter-btn" data-cat="transition-metal">Transition metals</button>
  <button class="filter-btn" data-cat="post-transition">Post-transition</button>
  <button class="filter-btn" data-cat="metalloid">Metalloids</button>
  <button class="filter-btn" data-cat="nonmetal">Nonmetals</button>
  <button class="filter-btn" data-cat="halogen">Halogens</button>
  <button class="filter-btn" data-cat="noble-gas">Noble gases</button>
  <button class="filter-btn" data-cat="lanthanide">Lanthanides</button>
  <button class="filter-btn" data-cat="actinide">Actinides</button>
</div>
<div id="table-area"><div id="pt-grid"></div></div>
<div id="legend"></div>
<div id="panel">
  <div id="panel-top">
    <div id="panel-num"></div>
    <div id="panel-info">
      <div id="panel-name"></div>
      <div id="panel-cat"></div>
    </div>
    <div id="panel-sym"></div>
    <button class="close-btn" id="close-panel">×</button>
  </div>
  <div id="panel-grid">
    <div class="p-stat"><div class="p-stat-label">Atomic mass</div><div class="p-stat-val" id="p-mass">—</div></div>
    <div class="p-stat"><div class="p-stat-label">Period / Group</div><div class="p-stat-val" id="p-pg">—</div></div>
    <div class="p-stat"><div class="p-stat-label">Electron config</div><div class="p-stat-val" id="p-ec" style="font-size:12px">—</div></div>
    <div class="p-stat"><div class="p-stat-label">Electronegativity</div><div class="p-stat-val" id="p-en">—</div></div>
    <div class="p-stat"><div class="p-stat-label">Boiling point</div><div class="p-stat-val" id="p-bp">—</div></div>
    <div class="p-stat"><div class="p-stat-label">Melting point</div><div class="p-stat-val" id="p-mp">—</div></div>
  </div>
</div>

function getRow(el){
  if(el.period===8)return 9;
  if(el.period===9)return 10;
  return el.period;
}

function makeGrid(){
  const grid=document.getElementById('pt-grid');
  const byPos={};
  elements.forEach(el=>{
    byPos[`${getRow(el)}-${el.group}`]=el;
  });
  for(let r=1;r<=10;r++){
    if(r===9||r===10){
      const lbl=document.createElement('div');
      lbl.className='lbl';
      lbl.style.cssText='grid-column:1/3;grid-row:'+r;
      lbl.textContent=r===9?'Lanthanides →':'Actinides →';
      grid.appendChild(lbl);
      for(let c=3;c<=18;c++){
        const el=byPos[`${r}-${c}`];
        const div=document.createElement('div');
        div.style.cssText=`grid-column:${c};grid-row:${r}`;
        if(el){
          div.className='cell';
          div.dataset.cat=el.cat;
          div.style.background=CAT_COLORS[el.cat];
          div.style.color=CAT_TEXT[el.cat];
          div.innerHTML=`<span class="num">${el.n}</span><span class="sym">${el.s}</span>`;
          div.title=el.name;
          div.addEventListener('click',()=>showPanel(el));
        }else{
          div.className='cell empty';
        }
        grid.appendChild(div);
      }
    } else {
      for(let c=1;c<=18;c++){
        const el=byPos[`${r}-${c}`];
        const div=document.createElement('div');
        div.style.cssText=`grid-column:${c};grid-row:${r}`;
        if(el){
          div.className='cell';
          div.dataset.cat=el.cat;
          div.style.background=CAT_COLORS[el.cat];
          div.style.color=CAT_TEXT[el.cat];
          div.innerHTML=`<span class="num">${el.n}</span><span class="sym">${el.s}</span>`;
          div.title=el.name;
          div.addEventListener('click',()=>showPanel(el));
        }else{
          div.className='cell empty';
        }
        grid.appendChild(div);
      }
    }
  }
}

function showPanel(el){
  document.getElementById('panel-num').textContent=el.n;
  document.getElementById('panel-sym').textContent=el.s;
  document.getElementById('panel-sym').style.color=CAT_COLORS[el.cat];
  document.getElementById('panel-name').textContent=el.name;
  document.getElementById('panel-cat').textContent=CAT_LABELS[el.cat];
  document.getElementById('p-mass').textContent=el.mass+' u';
  document.getElementById('p-pg').textContent=el.period+' / '+el.group;
  document.getElementById('p-ec').textContent=el.ec;
  document.getElementById('p-en').textContent=el.en;
  document.getElementById('p-bp').textContent=el.bp;
  document.getElementById('p-mp').textContent=el.mp;
  const panel=document.getElementById('panel');
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function makeLegend(){
  const leg=document.getElementById('legend');
  Object.entries(CAT_LABELS).forEach(([cat,label])=>{
    const item=document.createElement('div');
    item.className='leg-item';
    item.innerHTML=`<div class="leg-dot" style="background:${CAT_COLORS[cat]}"></div><span>${label}</span>`;
    leg.appendChild(item);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cat=btn.dataset.cat;
    document.querySelectorAll('.cell[data-cat]').forEach(cell=>{
      if(cat==='all'||cell.dataset.cat===cat){cell.classList.remove('dim');}
      else{cell.classList.add('dim');}
    });
  });
});

document.getElementById('close-panel').addEventListener('click',()=>{
  document.getElementById('panel').style.display='none';
});

makeGrid();
makeLegend();
</script>
